<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>כלי תרגול: סדר דין פלילי</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap');
:root{
  --bg:#f0f4f8;--surface:#fff;--text:#1f2937;--text-dim:#6b7280;--text-faint:#9ca3af;--border:#e5e7eb;
  --tab-off-bg:#e5e7eb;--tab-off-text:#374151;--tab-off-hover:#d1d5db;
  --pattern-bg:#fef3c7;--pattern-border:#f59e0b;--pattern-text:#92400e;
}
body.dark{
  --bg:#0f1120;--surface:#1a1c2e;--text:#e5e7eb;--text-dim:#9ca3af;--text-faint:#6b7280;--border:#2e3148;
  --tab-off-bg:#262940;--tab-off-text:#cbd5e1;--tab-off-hover:#323654;
  --pattern-bg:#3a2a06;--pattern-border:#f59e0b;--pattern-text:#fde68a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo','Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);transition:background .2s,color .2s;}
.app{max-width:680px;margin:0 auto;padding:0 16px 60px;}
h1{font-size:1.4rem;font-weight:700;color:#4f46e5;}
.sub{font-size:.8rem;color:var(--text-dim);margin-top:4px;}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;padding:16px 0 4px;}
.theme-btn{border:none;background:var(--tab-off-bg);color:var(--text);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:1rem;}
.tabs{display:flex;gap:8px;margin:12px 0 16px;overflow-x:auto;}
.tab{padding:9px 16px;border-radius:8px;font-weight:600;cursor:pointer;border:none;white-space:nowrap;font-family:inherit;font-size:.85rem;}
.tab.on{background:#6366f1;color:#fff;}
.tab:not(.on){background:var(--tab-off-bg);color:var(--tab-off-text);}
.tab:not(.on):hover{background:var(--tab-off-hover);}
.card{background:var(--surface);border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:16px;margin-bottom:12px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
.stat-card{background:var(--surface);border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:14px;text-align:center;}
.stat-num{font-size:2rem;font-weight:700;}
.stat-lbl{font-size:.75rem;color:var(--text-dim);margin-top:2px;}
.pbar{height:8px;border-radius:4px;background:var(--border);overflow:hidden;margin-top:4px;}
.pfill{height:100%;border-radius:4px;transition:width .3s;}
.topic-row{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:8px;border-radius:8px;}
.topic-row:hover{background:var(--tab-off-bg);}
.topic-label{font-size:.875rem;font-weight:500;}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.7rem;font-weight:600;}
.alert{border-radius:8px;padding:10px 12px;font-size:.85rem;margin-bottom:8px;}
.alert-pattern{border-radius:8px;padding:12px 14px;font-size:.85rem;margin-top:10px;background:var(--pattern-bg);border:2px solid var(--pattern-border);color:var(--pattern-text);font-weight:600;}
.btn{display:block;width:100%;padding:12px;border-radius:10px;font-weight:700;cursor:pointer;border:none;font-size:1rem;font-family:inherit;}
.btn-ind{background:#6366f1;color:#fff;} .btn-ind:hover{background:#4f46e5;}
.btn-gr{background:#10b981;color:#fff;} .btn-gr:hover{background:#059669;}
.btn-re{background:#ef4444;color:#fff;} .btn-re:hover{background:#dc2626;}
.btn-gy{background:var(--tab-off-bg);color:var(--text);} .btn-gy:hover{background:var(--tab-off-hover);}
.btn-sm{padding:8px 14px;width:auto;display:inline-block;font-size:.875rem;}
.btn-row{display:flex;gap:8px;margin-top:8px;}
.btn-row .btn{flex:1;}
.opt{border:2px solid var(--border);border-radius:8px;padding:10px 14px;cursor:pointer;text-align:right;width:100%;background:var(--surface);color:var(--text);margin-bottom:8px;font-size:.9rem;display:block;font-family:inherit;}
.opt:hover{border-color:#6366f1;background:#eef2ff;color:#1f2937;}
.opt.sel{border-color:#6366f1;background:#eef2ff;color:#1f2937;}
.opt.ok{border-color:#10b981;background:#d1fae5;color:#065f46;}
.opt.bad{border-color:#ef4444;background:#fee2e2;color:#991b1b;}
.ans-box{padding:12px;border-radius:8px;margin-top:10px;font-size:.875rem;}
.ans-ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#065f46;}
.ans-bad{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;}
.timer{font-size:1.3rem;font-weight:700;font-family:monospace;}
.timer.urgent{color:#ef4444;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
.q-meta{font-size:.75rem;color:var(--text-faint);margin-bottom:8px;}
.q-text{line-height:1.7;white-space:pre-wrap;font-size:.95rem;}
.result-header{text-align:center;padding:20px;background:var(--surface);border-radius:12px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.big-score{font-size:3rem;font-weight:700;color:#6366f1;}
.r-card{border-radius:10px;padding:14px;margin-bottom:10px;background:var(--surface);box-shadow:0 1px 4px rgba(0,0,0,.06);border-right:4px solid var(--border);}
.r-ok{border-right-color:#10b981;}
.r-bad{border-right-color:#ef4444;}
.opt-review{padding:6px 10px;border-radius:6px;font-size:.82rem;margin-bottom:4px;}
.opt-ans{background:#d1fae5;color:#065f46;font-weight:600;}
.opt-wrong{background:#fee2e2;color:#991b1b;}
.opt-plain{background:var(--tab-off-bg);color:var(--text-dim);}
.expl{background:#eff6ff;border-radius:6px;padding:8px;font-size:.8rem;color:#1e40af;margin-top:8px;}
.flip-card{perspective:800px;cursor:pointer;height:210px;margin-bottom:12px;}
.flip-inner{width:100%;height:100%;transition:transform .4s;transform-style:preserve-3d;position:relative;}
.flip-card.flipped .flip-inner{transform:rotateY(180deg);}
.flip-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:12px;display:flex;align-items:center;justify-content:center;padding:16px;}
.flip-front{background:#6366f1;color:#fff;flex-direction:column;text-align:center;}
.flip-back{background:#1e1b4b;color:#fff;transform:rotateY(180deg);align-items:flex-start;font-size:.85rem;overflow-y:auto;}
.flip-topic{font-size:.7rem;opacity:.7;margin-bottom:6px;}
.flip-q{font-size:1rem;font-weight:700;}
.flip-hint{font-size:.65rem;opacity:.4;margin-top:8px;}
.flip-ans{white-space:pre-wrap;line-height:1.6;}
.progress-counter{font-size:.8rem;color:var(--text-dim);text-align:center;margin-bottom:8px;}
.topic-btn{border:2px solid var(--border);border-radius:8px;padding:8px 12px;cursor:pointer;background:var(--surface);color:var(--text);font-size:.8rem;font-family:inherit;}
.topic-btn.on{border-color:#6366f1;background:#eef2ff;color:#4f46e5;font-weight:600;}
.topic-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.known-bar{display:flex;gap:16px;font-size:.85rem;flex-wrap:wrap;}
.ans-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.ans-cell{width:34px;height:34px;border-radius:8px;border:2px solid var(--border);background:var(--surface);color:var(--text);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;cursor:pointer;font-family:inherit;}
.ans-cell.answered{background:#6366f1;color:#fff;border-color:#6366f1;}
.ans-cell.current{border-color:#f59e0b;box-shadow:0 0 0 2px #f59e0b55;}
textarea.open-ans{width:100%;min-height:160px;border:2px solid var(--border);border-radius:8px;padding:10px;font-family:inherit;font-size:.9rem;background:var(--surface);color:var(--text);resize:vertical;}
.model-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px;font-size:.85rem;color:#1e3a8a;margin-top:10px;white-space:pre-wrap;line-height:1.7;}
body.dark .model-box{background:#0e2038;color:#bfdbfe;border-color:#1e3a5f;}
.your-ans-box{background:var(--tab-off-bg);border-radius:8px;padding:10px;font-size:.85rem;margin-top:10px;white-space:pre-wrap;line-height:1.7;color:var(--text);}
.aid-list{font-size:.85rem;line-height:1.9;}
.chk{list-style:none;padding:0;font-size:.86rem;line-height:1.75;}
.chk li{padding:3px 0 3px 0;}
.chk li::before{content:'☐ ';color:#6366f1;font-weight:700;}
</style>
</head>
<body>
<div class="app">
<div id="appMain">
  <div class="topbar">
    <div>
      <h1>⚖️ כלי תרגול: סדר דין פלילי</h1>
      <div class="sub">פרופ' מיכל טמיר · עו"ד ורד זגורי · תשפ"ו · <span id="qcount"></span> שאלות · <span id="ccount"></span> פסקי דין</div>
    </div>
    <div style="display:flex;gap:6px">
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="מצב כהה/בהיר">🌙</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="showTab('dash')">🏠 לוח בקרה</button>
    <button class="tab" onclick="showTab('sim')">🎯 סימולציה</button>
    <button class="tab" onclick="showTab('study')">📚 לפי נושא</button>
    <button class="tab" onclick="showTab('flash')">🗂️ פסיקה</button>
    <button class="tab" onclick="showTab('bris')">🎤 קייסים פתוחים</button>
    <button class="tab" onclick="showTab('aids')">📎 ערכת מבחן</button>
  </div>
  <div id="dash"></div>
  <div id="sim" style="display:none"></div>
  <div id="study" style="display:none"></div>
  <div id="flash" style="display:none"></div>
  <div id="bris" style="display:none"></div>
  <div id="aids" style="display:none"></div>
</div>
</div>

<script>
// ── Theme ────────────────────────────────────────────────────────────────
function loadTheme(){return localStorage.getItem('sadap1_theme')||'light';}
function applyTheme(t){document.body.classList.toggle('dark',t==='dark');const b=document.getElementById('themeBtn');if(b)b.textContent=t==='dark'?'☀️':'🌙';}
function toggleTheme(){const t=loadTheme()==='dark'?'light':'dark';localStorage.setItem('sadap1_theme',t);applyTheme(t);}
applyTheme(loadTheme());

// ── Data: topics ─────────────────────────────────────────────────────────
const TOPICS = [
  {id:'mavo', name:`מבוא ומהפכה חוקתית`, icon:'📜', desc:`מודל פקר, אדברסרי/אינקוויזיטורי, אמת עובדתית מול משפטית, יששכרוב, פסקת ההגבלה`},
  {id:'chakira', name:`חקירה וזכויות נחקרים`, icon:'🕵️', desc:`שתיקה, היוועצות (ס' 34), אי-הפללה, תחבולה מול פיתוי פסול, מדובבים, שפת החקירה`},
  {id:'psilat-raayot', name:`פסילת ראיות (יששכרוב)`, icon:'🚫', desc:`הכלל הפסיקתי היחסי, 3 קבוצות שיקולים, ס' 56א, ראיות נגזרות (פרחי), הרחבת ס' 12`},
  {id:'ikuv-chipus', name:`עיכוב, חיפוש ותפיסה`, icon:'🔎', desc:`עיכוב חשוד/עד, ס' 24, הסכמה מדעת (בן חיים), חיפוש בטלפון (אוריך), חיפוש בגוף`},
  {id:'maatzar', name:`דיני מעצרים`, icon:'⛓️', desc:`מעצר ראשוני, מעצר ימים, הצהרת תובע, מעצר עד תום ההליכים, חלופות, ערר ועיון חוזר`},
  {id:'shimua-ktav', name:`שימוע וכתב אישום`, icon:'📝', desc:`שימוע ס' 60א, פרטי כ"א ס' 85, פגם מול פסול, תיקון כ"א, חזרה מאישום, בטלות יחסית`},
  {id:'tzeiruf', name:`התליה, עיכוב וצירוף`, icon:'🔗', desc:`התליית הליכים, עיכוב הליכים ס' 231, צירוף אישומים/נאשמים (סוסן), הפרדה, צירוף תיקים`},
  {id:'mukdamot', name:`טענות מקדמיות (ס' 149)`, icon:'🧱', desc:`סמכות עניינית/מקומית, כבר זוכיתי (ס' 149(5)), סיכון כפול, התיישנות (ס' 9), חסינות, חנינה`},
  {id:'hagana-tzedek', name:`הגנה מן הצדק ואכיפה בררנית`, icon:'⚖️', desc:`מבחן בורוביץ' התלת-שלבי, אכיפה בררנית, דרישת הדמיון הרלוונטי, זקין`},
  {id:'mahalach', name:`מהלך המשפט ופוסט-משפט`, icon:'🏛️', desc:`סדר הדיון, פסלות שופט (ידיד/בראון), נוכחות ואי-התייצבות, ערעור, דיון נוסף, משפט חוזר`}
];

// ── Data: case-law bank ──────────────────────────────────────────────────
const CASES = [
  {id:'c1', name:`יששכרוב נ' התובע הצבאי הראשי`, topic:`פסילת ראיות`, holding:`נולד הכלל הפסיקתי היחסי לפסילת ראיה שהושגה שלא כדין (ב"מ רשאי, לא חייב). 3 קבוצות שיקולים. הרחבת ס' 12 לפקודת הראיות להגנה על אוטונומיית הרצון. עוגן בס' 56א.`},
  {id:'c2', name:`גנימאת נ' מ"י`, topic:`מעצרים`, holding:`חוקים ישנים נפרשים ברוח חוק היסוד. 'מכת מדינה' / חומרת העבירה כשלעצמה אינה עילת מעצר עצמאית — העילה נבחנת ביחס לנאשם הקונקרטי.`},
  {id:'c3', name:`אסף שי נ' מ"י`, topic:`חקירה`, holding:`ס' 34 לחוק המעצרים (זכות היוועצות) חל גם על חשוד שאינו עצור. 'ללא דיחוי' = עצירת החקירה כדי לאפשר פגישה עם עו"ד המגיע בזמן סביר.`},
  {id:'c4', name:`בן חיים נ' מ"י`, topic:`עיכוב וחיפוש`, holding:`חיפוש בהסכמה ללא חשד סביר מותר רק ב'הסכמה מדעת': השוטר חייב להסביר שיש זכות לסרב ושהסירוב לא ייזקף לחובת הנחקר. בעקבותיה בוטלו תיקים רבים.`},
  {id:'c5', name:`אוריך נ' מ"י`, topic:`עיכוב וחיפוש`, holding:`ניתן להעלות טענות יששכרוב כבר בשלב הדיון בבקשת הצו (לפני כ"א). חיפוש בטלפון/מחשב מחייב צו שיפוטי — גם בהסכמה מדעת.`},
  {id:'c6', name:`פרחי נ' מ"י`, topic:`פסילת ראיות`, holding:`ראיות נגזרות: מחילים את שיקולי יששכרוב + מבחן הזיקה. קשר הדוק בין הראיה הפסולה לנגזרת → נטייה לפסול; קשר רופף → אפשר להכשיר. קשר עובדתי בלבד אינו מספיק.`},
  {id:'c7', name:`זאדה נ' מ"י`, topic:`מעצרים`, holding:`'ראיות לכאורה' למעצר עד תום ההליכים = 'סיכוי סביר להרשעה'. רף גבוה מ'חשד סביר' ונמוך מ'מעבר לכל ספק סביר'. זהה לרף להגשת כתב אישום.`},
  {id:'c8', name:`בורוביץ' נ' מ"י`, topic:`הגנה מן הצדק`, holding:`מבחן תלת-שלבי: (1) זיהוי הפגם ועוצמתו במנותק מהאשמה; (2) איזון אינטרסים; (3) האם ניתן לרפא באמצעי מתון מביטול כ"א. הגנה מתקבלת רק במקרים חריגים.`},
  {id:'c9', name:`סוסן נ' מ"י`, topic:`צירוף`, holding:`דעת רוב: ס' 86 משמש עוגן לצירוף נאשמים גם בחצייה עניינית — אך עדיין יש לעמוד בתנאי ס' 87. גולדברג (מיעוט): 86 ו-87 מסלולים נפרדים. לדעת את שתי הדעות!`},
  {id:'c10', name:`קורמן נ' מ"י`, topic:`מעצרים`, holding:`נאשם ששמר על זכות שתיקה מתקשה להפריך את חזקת המסוכנות. ביקורת (תמיר): מערבב תשתית ראייתית עם עילות, והופך את המעצר ל'עונש על זכות שתיקה חוקתית'.`},
  {id:'c11', name:`פלגן / ברונסון`, topic:`מעצרים`, holding:`עילת 'צורכי חקירה' (עילה שלישית במעצר ימים): נדרשת הוכחת 'פגיעה חמורה וקשה ביכולת הסבירה של החקירה' — לא די בכך שיהיה 'קל יותר' עם מעצר. 5 ימים כל פעם, עד 15 סה"כ.`},
  {id:'c12', name:`אלזם נ' מ"י`, topic:`פסילת ראיות`, holding:`מדובבים שחרגו מתפקידם ו'השתלטו על נפש החשוד' → פגיעה בשתיקה, בהיוועצות ובאוטונומיה. פסילת ההודאה מכוח ס' 12 + הכלל הפסיקתי. זיכוי מרצח.`},
  {id:'c13', name:`חייבטוב נ' מ"י`, topic:`פסילת ראיות`, holding:`הבאת סמים קשים לתא ע"י מדובבים = פגיעה חמורה באוטונומיה → פסילת ההודאה. זיכוי מרצח לאחר 12 שנות מאסר. הביטוי הקשה ביותר של הדילמה.`},
  {id:'c14', name:`מורוזובה נ' מ"י`, topic:`מעצרים`, holding:`עיקרון החוקיות: אין מקור חוקי למחיקת ימי מעצר קודמים לאחר משפט מחדש — ממשיכים למנות. 'הגיוני' לא מספיק; נדרש עיגון מפורש בחוק.`},
  {id:'c15', name:`עודה נ' מ"י`, topic:`מעצרים`, holding:`אין עבירה שבצידה חובת מעצר — אפילו ברצח. תמיד קיים שיקול דעת שיפוטי; אין מעצר אוטומטי.`},
  {id:'c16', name:`גולד + אנקונינה`, topic:`מעצרים`, holding:`שימוש בנשק קטלני אגב מעצר — 3 תנאים מצטברים: (1) מעצר חוקי; (2) פשע מסכן חיים; (3) הירי כאמצעי אחרון. הירי לניטרול, לא להרוג.`},
  {id:'c17', name:`חסיד נ' מ"י`, topic:`מעצרים`, holding:`ראיות לכאורה מוחלשות עשויות להצדיק חלופת מעצר (לא מעצר מלא ולא שחרור). ביקורת תמיר: נכון רציונלית אך נוגד את לשון החוק הדיכוטומית ('יש/אין ראיות').`},
  {id:'c18', name:`אבו עצה נ' מ"י`, topic:`חקירה`, holding:`פיתוי פסול = הבטחת טובת הנאה ממשית ומוחשית בתמורה לוויתור על זכות, שיש בה שימוש לרעה בסמכות שלטונית. מותר לשקר ולהפעיל לחץ; אסור להבטיח עונש/להשתמש במסמך מזויף.`},

 explanation:`יש להבחין בין תחבולה לגיטימית לבין פיתוי/פגיעה פסולים: מותר לשקר, להפעיל לחץ פסיכולוגי מסוים ולהציג ראיות שגויות שאינן מזויפות; אסור להשתמש במסמכים מזויפים, להבטיח עונש, ולהפעיל מדובבים ה'משתלטים על נפש החשוד' (אלזם, חייבטוב) או מביאים לו סמים (חייבטוב). המבחן אינו רק 'כוח פיזי'.`,
 source:`אבו עצה; אלזם; חייבטוב; גבולות החקירה`},

{id:'q6', type:'mcq', topic:'chakira', tag:'טכני', authentic:true,
 scenario:`עֵד (שאינו חשוד) נחקר במשטרה בקשר לעבירה. הוא מסרב לענות על שאלה מסוימת בטענה שהתשובה אינה נעימה לו, ולאחר מכן מסרב לענות על שאלה שהתשובה עלולה להפלילו. מה מעמדו המשפטי בשני הסירובים?`,
 options:{
   'א':`עד רשאי לשתוק לחלוטין, בדיוק כמו חשוד.`,
   'ב':`עד חייב לענות על שאלות שאינן מפלילות אותו, אך זכות אי-ההפללה העצמית (ס' 2(2) לפקודת הפרוצדורה) מתירה לו שלא לענות על שאלה שתשובתה עלולה להפלילו.`,
   'ג':`עד חייב לענות על כל השאלות ללא יוצא מן הכלל, כולל מפלילות.`,
   'ד':`עד רשאי לשתוק על שאלות מפלילות ועל שאלות לא-נעימות כאחד, מכוח זכות השתיקה.`
 }, correct:'ב',
 explanation:`הבחנה חיונית: זכות השתיקה (לשתוק בכלל) חלה על חשוד בלבד; לעד עומדת רק זכות אי-ההפללה העצמית (ס' 2(2) לפקודת הפרוצדורה הפלילית). לכן עד חייב לענות על שאלות שאינן מפלילות, אך רשאי לסרב לענות על שאלה שתשובתה עלולה להפלילו.`,
 source:`ס' 2(2) לפקודת הפרוצדורה; אלמליח; הבחנת עד/חשוד`},

// ===== פסילת ראיות =====
{id:'q7', type:'mcq', topic:'psilat-raayot', tag:'טכני', authentic:true,
 scenario:`בית המשפט בוחן פסילת שתי ראיות שהושגו אגב אותה הפרה: (א) הודאת החשוד שנמסרה לאחר שלא הוסברה לו זכות השתיקה; (ב) סכין שנתפסה בעקבות אותה חקירה. באיזו קבוצת שיקולים מיששכרוב תיפול ההבחנה בין השתיים, ומה תהיה הנטייה?`,
 options:{
   'א':`הקבוצה הראשונה (חומרת אי-החוקיות); שתי הראיות ייפסלו יחד.`,
   'ב':`הקבוצה השנייה (אופי ומהות הראיה): ההודאה היא ראיה 'מושפעת' שתוכנה הושפע מהפגיעה — נטייה לפסול; הסכין היא ראיה 'עצמאית' שתוכנה לא השתנה — נטייה להכשיר.`,
   'ג':`הקבוצה השלישית (נזק מול תועלת); שתי הראיות יוכשרו.`,
   'ד':`ההבחנה אינה רלוונטית, שכן כל ראיה שהושגה שלא כדין נפסלת אוטומטית.`
 }, correct:'ב',
 explanation:`שלוש קבוצות השיקולים: (1) חומרת אי-החוקיות; (2) אופי/מהות הראיה — עצמאית (חפץ, DNA — תוכנה לא הושפע, נטייה להכשיר) מול מושפעת (הודאה — תוכנה הושפע מהפגיעה, נטייה לפסול); (3) נזק מול תועלת. ההבחנה כאן היא בליבת הקבוצה השנייה.`,
 source:`יששכרוב — 3 קבוצות שיקולים`},

{id:'q8', type:'mcq', topic:'psilat-raayot', tag:'טכני', authentic:true,
 scenario:`חשוד מסר מרצונו דגימת DNA. במקרה התגלה שהיא תואמת לזירת עבירה אחרת. הוא נעצר, וממנו הושגו ראיות נוספות: (א) דגימת DNA שנייה שנלקחה שלא כדין; (ב) איכון טלפון שנעשה בהמשך. הסנגור טוען שכל הראיות הנגזרות פסולות. כיצד ינותח?`,
 options:{
   'א':`כל הראיות הנגזרות פסולות אוטומטית מרגע שהראיה הראשונה פסולה ('פירות העץ המורעל').`,
   'ב':`מחילים על הנגזרות את שיקולי יששכרוב + מבחן הזיקה: קשר הדוק לראיה הפסולה נוטה לפסילה (ה-DNA השני), קשר רופף עשוי להיוותר (איכון הטלפון). קשר עובדתי בלבד אינו מספיק לפסילה.`,
   'ג':`ראיות נגזרות אינן נפסלות לעולם — הכלל חל רק על הראיה המקורית.`,
   'ד':`הפסילה תלויה אך ורק בשאלה אם החוקר פעל בזדון.`
 }, correct:'ב',
 explanation:`פרשת פרחי: על ראיות נגזרות מחילים את שיקולי יששכרוב בתוספת 'מבחן הזיקה' — עוצמת הקשר בין הראיה הפסולה לנגזרת. קשר הדוק → נטייה לפסול (DNA שני); קשר רופף → אפשר להכשיר (איכון). קשר סיבתי עובדתי בלבד אינו מספיק — נדרש קשר משפטי. ישראל דחתה את דוקטרינת 'פירות העץ המורעל' האוטומטית.`,
 source:`פרחי — ראיות נגזרות ומבחן הזיקה`},

{id:'q9', type:'mcq', topic:'psilat-raayot', tag:'ערכי', authentic:true,
 scenario:`בית המשפט מזכה נאשם מרצח לאחר 12 שנות מאסר, לאחר שנמצא כי מדובבים הביאו לו סמים קשים לתאו וכך הושגה הודאתו. השופט מציין שייתכן שהנאשם הוא אכן הרוצח, אך מחדלי החקירה יצרו חוסר ידיעה בלתי ניתן לריפוי. מהי ההצדקה העיונית המרכזית לפסילה כאן?`,
 options:{
   'א':`הפסילה נועדה להעניש את המשטרה בלבד; אין לה בסיס בזכויות החשוד.`,
   'ב':`הבאת סמים קשים ע"י מדובבים היא פגיעה חמורה באוטונומיית הרצון החופשי; הודאה כזו נפסלת מכוח ס' 12 (הרחבתו ביששכרוב) ומכוח הכלל הפסיקתי, גם במחיר ויתור על האמת העובדתית.`,
   'ג':`הפסילה מבוססת על כך שההודאה בהכרח שקרית.`,
   'ד':`הפסילה נובעת מכך שלמדובבים אין כלל סמכות לפעול בחקירה.`
 }, correct:'ב',
 explanation:`חייבטוב מבטא את הדילמה בחריפות: הבאת סמים היא פגיעה קשה באוטונומיית הרצון החופשי — ערך שהוגן בהרחבת ס' 12 לפקודת הראיות ביששכרוב, בנוסף לכלל הפסיקתי. הפסילה אינה נשענת על אי-אמינות ההודאה (ייתכן שהיא אמת) אלא על הפגם בדרך השגתה, גם במחיר האמת העובדתית.`,
 source:`חייבטוב; אלזם; הרחבת ס' 12`},

// ===== עיכוב, חיפוש ותפיסה =====
{id:'q10', type:'mcq', topic:'ikuv-chipus', tag:'טכני', authentic:true,
 scenario:`שוטר עוצר אדם ברחוב, שואל 'מותר לחפש עליך?', והלה עונה 'כן'. בחיפוש נמצאת סכין. לא היה לשוטר חשד סביר מוקדם. השוטר לא הסביר דבר מלבד השאלה. הסנגור מבקש לפסול. מה הדין?`,
 options:{
   'א':`החיפוש כשר: הסכמה מפורשת מכשירה כל חיפוש, גם ללא חשד סביר.`,
   'ב':`החיפוש פסול: הסכמה יכולה להכשיר חיפוש ללא חשד סביר רק אם היא 'הסכמה מדעת' — השוטר חייב להסביר שיש זכות לסרב ושהסירוב לא ייזקף לחובה (בן חיים).`,
   'ג':`החיפוש כשר, שכן משנמצאה סכין ממילא התגבש חשד סביר בדיעבד.`,
   'ד':`החיפוש פסול תמיד — לא ניתן לחפש על גוף אדם ללא צו שיפוטי.`
 }, correct:'ב',
 explanation:`בפרשת בן חיים נקבע שהסכמה מכשירה חיפוש ללא חשד סביר רק אם היא 'הסכמה מדעת': על השוטר להסביר שקיימת זכות לסרב, ושהסירוב לא ייזקף לחובת הנחקר. כאן לא ניתן הסבר כזה — החיפוש פסול. תשובה ג' שגויה (אין 'הכשרה בדיעבד' מהתוצאה).`,
 source:`בן חיים — הסכמה מדעת`},

{id:'q11', type:'mcq', topic:'ikuv-chipus', tag:'טכני', authentic:true,
 scenario:`חשוד מסכים 'הסכמה מדעת' מלאה לכך שהשוטרים יעיינו בטלפון הנייד שלו. השוטרים מעיינים בתכתובות ומוצאים חומר מפליל. הסנגור טוען שהיה צורך בצו שיפוטי. מה הדין?`,
 options:{
   'א':`משניתנה הסכמה מדעת — אין צורך בצו, גם לגבי טלפון.`,
   'ב':`חיפוש בטלפון/מחשב מחייב תמיד צו שיפוטי, גם כשניתנה הסכמה מדעת (אוריך).`,
   'ג':`צו נדרש רק אם הטלפון נעול בסיסמה.`,
   'ד':`צו נדרש רק אם החשוד עצור.`
 }, correct:'ב',
 explanation:`בעניין אוריך (שאושר בדנ"פ) נקבע שהעיון בתוכן טלפון/מחשב הוא פגיעה עמוקה בפרטיות המחייבת צו שיפוטי — גם כשקיימת הסכמה מדעת. עוד נקבע שם שניתן להעלות טענות יששכרוב כבר בשלב הדיון בבקשת הצו.`,
 source:`אוריך; דנ"פ אוריך`},

{id:'q12', type:'mcq', topic:'ikuv-chipus', tag:'טכני', authentic:true,
 scenario:`שוטר מבקש לעכב אדם. באיזה מהמצבים הבאים חורג השוטר מסמכות העיכוב אל עבר מעצר?`,
 options:{
   'א':`עיכוב עד לבירור זהות למשך זמן סביר שאינו עולה על שלוש שעות.`,
   'ב':`עיכוב חשוד בעבירת חטא לצורך חקירה.`,
   'ג':`החזקת האדם מעל למשך הזמן הסביר לעיכוב (מעבר לשלוש שעות, ובריבוי מעורבים — שש) — שאז מדובר למעשה במעצר הטעון עילה ובסיס עצמאיים.`,
   'ד':`דרישה מהאדם להזדהות.`
 }, correct:'ג',
 explanation:`עיכוב מוגבל מראש בזמן ובתכלית: זמן סביר עד שלוש שעות (ובריבוי מעורבים — עוד שלוש, בנימוקים בכתב). עיכוב אפשרי בכל עבירה כולל חטא. חריגה ממשך הזמן הופכת את ההגבלה למעצר, הדורש עילה ובסיס עצמאיים (ומעצר אפשרי רק בעוון/פשע, לא בחטא).`,
 source:`ס' 66-75 לחוק המעצרים; הבחנת עיכוב/מעצר`},

// ===== דיני מעצרים =====
{id:'q13', type:'mcq', topic:'maatzar', tag:'טכני', authentic:true,
 scenario:`שוטר מבקש לעצור אדם ללא צו שופט. באיזו מהעבירות הבאות אין לשוטר סמכות מעצר (להבדיל מעיכוב)?`,
 options:{
   'א':`עבירת פשע שדינה מאסר עולם.`,
   'ב':`עבירת עוון (מעל 3 חודשי מאסר).`,
   'ג':`עבירת חטא (עד 3 חודשי מאסר).`,
   'ד':`עבירת סמים.`
 }, correct:'ג',
 explanation:`'עבירה בת מעצר' (ס' 1 להגדרות) היא כל עבירה למעט חטא — כלומר עוון או פשע בלבד. לכן בחטא ניתן לעכב אך לא לעצור. זהו שוני מרכזי בין עיכוב (אפשרי בכל עבירה כולל חטא) לבין מעצר.`,
 source:`ס' 23 + הגדרת 'עבירה בת מעצר'`},

{id:'q14', type:'mcq', topic:'maatzar', tag:'טכני', authentic:true,
 scenario:`שוטר עוצר אדם. מבין חובות ס' 24 לחוק המעצרים, על איזו חובה אין כל חריג — כלומר 'יהרג ובל יעבור'?`,
 options:{
   'א':`חובת ההזדהות (הצגת תעודת שוטר).`,
   'ב':`חובת מסירת עותק הצו.`,
   'ג':`חובת הודעת הסטטוס ('אתה עצור') — חובה מוחלטת ללא כל חריג.`,
   'ד':`חובת ההבהרה של סיבת המעצר.`
 }, correct:'ג',
 explanation:`שלוש חובות ס' 24: הזדהות, הודעת סטטוס והבהרת סיבה (ועותק צו — רק כשיש צו). לחובות ההזדהות וההבהרה יש חריגים (זהות ברורה, סיכול, ביטחון), אך להודעת הסטטוס ('אתה עצור') אין כל חריג — היא תנאי מוחלט לחוקיות המעצר. חובות אלה חלות גם על עיכוב (ס' 72).`,
 source:`ס' 24 לחוק המעצרים; קדושים`},

{id:'q15', type:'mcq', topic:'maatzar', tag:'ערכי', authentic:true,
 scenario:`בבקשה למעצר עד תום ההליכים מבקש התובע לעצור נאשם ברצח, בטענה שברצח קיימת 'חובת מעצר' ואין לבית המשפט שיקול דעת. בנוסף הוא מציין שהעבירה היא 'מכת מדינה'. הנאשם שמר על זכות שתיקה בחקירה. איזו טענה של התובע שגויה?`,
 options:{
   'א':`הטענה בדבר 'חובת מעצר' ברצח שגויה — אין עבירה שבצידה חובת מעצר, תמיד קיים שיקול דעת (עודה); וגם 'מכת מדינה' אינה עילת מעצר עצמאית (גנימאת).`,
   'ב':`כל טענות התובע נכונות: ברצח יש חובת מעצר.`,
   'ג':`הטענה בדבר 'מכת מדינה' נכונה — היא עילת מעצר עצמאית מוכרת.`,
   'ד':`שתיקת הנאשם כשלעצמה מקימה חובת מעצר.`
 }, correct:'א',
 explanation:`שתי טעויות בפי התובע: (1) אין חובת מעצר אפילו ברצח — תמיד שיקול דעת (עודה); (2) 'מכת מדינה'/חומרת העבירה אינה עילת מעצר עצמאית — העילה נבחנת ביחס לנאשם הקונקרטי (גנימאת). לגבי השתיקה — לפי קורמן היא מקשה על הפרכת חזקת המסוכנות, אך אינה 'חובת מעצר' (וזו הלכה שספגה ביקורת).`,
 source:`עודה; גנימאת; קורמן`},

{id:'q16', type:'mcq', topic:'maatzar', tag:'טכני', authentic:true,
 scenario:`חשוד נעצר במעצר ימים. חלפו 30 ימים רצופים ממעצרו, החקירה טרם הסתיימה, והמשטרה מבקשת הארכה נוספת. לא הוגש אישור היועמ"ש. מה הדין?`,
 options:{
   'א':`בית המשפט רשאי להאריך ללא הגבלה כל עוד החקירה נמשכת.`,
   'ב':`לא ניתן להאריך מעבר ל-30 ימי מעצר רצופים בלא אישור היועץ המשפטי לממשלה; בהיעדרו — אין להאריך.`,
   'ג':`ניתן להאריך עד 75 ימים אוטומטית ללא אישור.`,
   'ד':`חלה מגבלת 15 ימים בלבד, ולכן כבר בחלוף 15 ימים היה חובה לשחרר.`
 }, correct:'ב',
 explanation:`במעצר ימים, סך המעצר לא יעלה על 30 ימים בגין אותו אירוע ללא אישור היועמ"ש; באישורו — עד 75 ימים. משחלפו 30 ימים רצופים ולא הוגש אישור היועמ"ש, אין להאריך. (עילת 'צורכי חקירה' לבדה מוגבלת ל-5 ימים כל פעם ועד 15 סה"כ.)`,
 source:`ס' 13, 17, 59 לחוק המעצרים`},

{id:'q17', type:'mcq', topic:'maatzar', tag:'טכני', authentic:true,
 scenario:`הוגשה 'הצהרת תובע' לבית המשפט המחוזי, ובה התבקשו ימי מעצר. הצהרת התובע לא פירטה את סעיפי העבירה המדויקים ולא התחייבה בוודאות שיוגש כתב אישום. הסנגור מעלה שתי טענות: (1) שהוגשה לערכאה שגויה; (2) שההצהרה פגומה משום שאינה מפרטת סעיפים ואינה מתחייבת. מה נכון?`,
 options:{
   'א':`שתי טענות הסנגור נכונות: ההצהרה צריכה להיות מפורטת ומתחייבת, ולהיות מוגשת למחוזי.`,
   'ב':`רק הטענה הראשונה נכונה: הצהרת תובע מוגשת לבית משפט השלום (ס' 2 לחוק המעצרים); אך אין חובה לפרט סעיפים (שימול) ואין חובה להתחייב בוודאות (בדאווי).`,
   'ג':`שתי הטענות שגויות.`,
   'ד':`רק הטענה השנייה נכונה: ההצהרה צריכה לפרט סעיפים ולהתחייב.`
 }, correct:'ב',
 explanation:`הצהרת תובע ('מעצר גשר') מוגשת לבית משפט השלום (הסמכות העניינית לפני כ"א היא תמיד שלום), ולכן הטענה על הערכאה נכונה. אך מהותית: התובע אינו חייב להתחייב בוודאות שיוגש כ"א (בדאווי) ואינו חייב לפרט את סעיפי העבירה (שימול). לכן רק הטענה הראשונה מתקבלת.`,
 source:`ס' 17ד' + ס' 2 לחוק המעצרים; בדאווי; שימול`},

{id:'q18', type:'mcq', topic:'maatzar', tag:'ערכי', authentic:true,
 scenario:`בדיון במעצר עד תום ההליכים קובע השופט שהתשתית הראייתית 'מוחלשת ונסיבתית' וכי אין 'סיכוי סביר להרשעה' ברמה המלאה, ובכל זאת מורה על מעצר מאחורי סורג ובריח בשל חומרת העבירה. מהי הדרך הנכונה לנתח זאת, לרבות עמדת פרופ' טמיר?`,
 options:{
   'א':`כשהראיות מוחלשות, הנטייה לפי הלכת חסיד היא לחלופת מעצר ולא למעצר מלא; פרופ' טמיר מותחת ביקורת: התוצאה רציונלית אך נוגדת את לשון החוק הדיכוטומית ('יש/אין ראיות'), שלפיה ראיות מוחלשות = אין ראיות = לשחרר.`,
   'ב':`חומרת העבירה לבדה מצדיקה מעצר מלא, ואין כל בעיה בהחלטת השופט.`,
   'ג':`ראיות מוחלשות מחייבות תמיד מעצר מלא כדי להגן על הציבור.`,
   'ד':`הלכת חסיד קובעת ששחרור מוחלט הוא התוצאה היחידה האפשרית.`
 }, correct:'א',
 explanation:`הלכת חסיד: ראיות לכאורה מוחלשות עשויות להצדיק חלופת מעצר (לא מעצר מלא ולא שחרור). פרופ' טמיר מבקרת: אף שהתוצאה רציונלית, היא נוגדת את לשון החוק הדיכוטומית — לפי הלשון, אם הראיות מוחלשות אין 'ראיות לכאורה' כלל, ולכן יש לשחרר. חובה לציין את הביקורת בבחינה.`,
 source:`חסיד; זאדה; ביקורת תמיר`},

{id:'q19', type:'mcq', topic:'maatzar', tag:'טכני', authentic:true,
 scenario:`נאשם מוחזק במעצר מעורב: חלק מהתקופה מאחורי סורג ובריח, וחלקה בפיקוח אלקטרוני (איזוק). לצורך נקודת הבקרה של 9 חודשים בערכאה הדיונית, כיצד מחושבת התקופה?`,
 options:{
   'א':`כל ימי המעצר (סורג ואיזוק) נספרים באופן זהה, יום כנגד יום.`,
   'ב':`רק ימי הסורג נספרים; ימי האיזוק אינם נספרים כלל.`,
   'ג':`יחס 1:2 (סרימר): יום מאחורי סורג = שני ימי איזוק. החישוב: חודשי סורג + מחצית חודשי האיזוק, ובהגיע ל-9 חודשים פוקעת סמכות הערכאה הדיונית ופונים לעליון.`,
   'ד':`יחס 2:1: יומיים סורג = יום איזוק.`
 }, correct:'ג',
 explanation:`בפרשת סרימר נקבע יחס 1:2 למעצר מעורב — יום מאחורי סורג ובריח שקול לשני ימי פיקוח אלקטרוני. החישוב לנקודת ה-9 חודשים (ס' 61): X חודשי סורג + Y/2 חודשי איזוק. בהגיע ל-9 חודשים (18 באיזוק) פוקעת סמכות הערכאה הדיונית ויש לפנות לבית המשפט העליון (ס' 62).`,
 source:`סרימר; ס' 61-62 לחוק המעצרים`},

{id:'q20', type:'mcq', topic:'maatzar', tag:'טכני', authentic:true,
 scenario:`נדחתה בקשת הנאשם לשחרור לחלופת מעצר בבית משפט השלום. הנאשם הגיש ערר למחוזי, שנדחה. יומיים לאחר מכן נחשף הסנגור לראיה חדשה (סרטון אבטחה) העשויה לזכות את הנאשם. כיצד רשאי הסנגור לפעול?`,
 options:{
   'א':`להגיש בקשת רשות ערעור לעליון בתוך 30 יום על החלטת המחוזי.`,
   'ב':`להגיש בקשה לעיון חוזר לבית משפט השלום (הערכאה הדיונית) מכוח הנסיבה/הראיה החדשה; ואם תידחה — ערר בזכות למחוזי.`,
   'ג':`להגיש בקשה לעיון חוזר למחוזי, שכן הוא הערכאה האחרונה שדנה בתיק.`,
   'ד':`אין כל דרך פעולה — החלטת המחוזי בערר סופית.`
 }, correct:'ב',
 explanation:`עיון חוזר (ס' 52) מוגש לערכאה הדיונית (שלום) כשנתגלו עובדה/נסיבה חדשה או חלף זמן — וכאן התגלתה ראיה חדשה. אם ייְדחה, ניתן להגיש עליו ערר בזכות לערכאה שמעליה (מחוזי). בקשת רשות ערעור לעליון אינה המסלול לנסיבה חדשה.`,
 source:`ס' 52-53 לחוק המעצרים; רביזדה/ברטלר`},

// ===== שימוע וכתב אישום =====
{id:'q21', type:'mcq', topic:'shimua-ktav', tag:'טכני', authentic:true,
 scenario:`אדם חשוד בעבירה שדינה 7 שנות מאסר (גניבה ממעביד). התביעה מגישה נגדו כתב אישום מבלי ששלחה לו מכתב שימוע. הסנגור טוען לפגיעה בזכות השימוע. מה הדין?`,
 options:{
   'א':`אין פגם: חובת השימוע חלה רק בעבירות שדינן מאסר עולם.`,
   'ב':`מדובר בעבירת פשע (מעל 3 שנות מאסר), ולכן חלה חובת שימוע (ס' 60א'); ניתן לטעון זאת כטענה מקדמית — בית המשפט יכול לבטל את כתב האישום (שאינו מעשה בית דין) או להורות על שימוע בדיעבד.`,
   'ג':`אין חובת שימוע כלל בשלב שלפני כתב האישום.`,
   'ד':`הפרת חובת השימוע מזכה בזיכוי סופי שהוא מעשה בית דין.`
 }, correct:'ב',
 explanation:`חובת השימוע (ס' 60א') חלה בעבירות פשע — מעל 3 שנות מאסר. עבירה שדינה 7 שנים היא פשע, ולכן חלה חובה. הפרתה מועלית כטענה מקדמית; הסעד הוא ביטול כ"א (שאינו מעשה בית דין וניתן להגישו מחדש) או שימוע בדיעבד — לא זיכוי.`,
 source:`ס' 60א' לחסד"פ; מיון חטא/עוון/פשע`},

{id:'q22', type:'mcq', topic:'shimua-ktav', tag:'טכני', authentic:true,
 scenario:`בכתב אישום בעבירת איומים נכתב בעובדות שהנאשם אמר לקורבן 'אני ארצח אותך', אך לא צוין כלל היסוד הנפשי הנדרש (הכוונה להפחיד). כמו כן צורף לכתב האישום, בטעות, פירוט של עברו הפלילי של הנאשם. כיצד יסווגו שני הליקויים?`,
 options:{
   'א':`שניהם 'פגם': חוסר תוכן בכתב האישום.`,
   'ב':`שניהם 'פסול': הפרת דרישת חוק בהגשה.`,
   'ג':`השמטת היסוד הנפשי היא 'פגם' (חוסר יסוד מיסודות העבירה); כלילת העבר הפלילי בניגוד לדין היא 'פסול' (הפרת דרישת חוק). בשני המקרים חלה דוקטרינת הבטלות היחסית.`,
   'ד':`שני הליקויים מובילים לזיכוי אוטומטי של הנאשם.`
 }, correct:'ג',
 explanation:`הבחנה קריטית: 'פגם' = משהו שצריך היה להיות וחסר (השמטת יסוד עובדתי/נפשי, הוראת חיקוק, פרט חיוני). 'פסול' = הפרת דרישת חוק בהגשה (הגשה ללא שימוע/אישור מוסמך, כלילת עבר פלילי בניגוד לדין). התוצאה נקבעת לפי דוקטרינת הבטלות היחסית — פגם מהותי היורד לשורש עשוי להביא לביטול; טענה זו יש להעלות מיד לאחר ההקראה ולפני המענה.`,
 source:`פגם/פסול; בטלות יחסית; ס' 85, 149(3)`},

{id:'q23', type:'mcq', topic:'shimua-ktav', tag:'טכני', authentic:true,
 scenario:`לאחר ההקראה, ולאחר שהנאשם כפר, מבקשת התביעה לתקן את כתב האישום ולשנות את סעיף העבירה מהריגה לרצח (החמרה). הנאשם מתנגד וטוען שכבר בנה קו הגנה ושילם שכר טרחה. מה הדין?`,
 options:{
   'א':`התביעה רשאית לתקן בכל עת כרצונה — עליה רק להודיע לבית המשפט.`,
   'ב':`לאחר ההקראה נדרשת רשות בית המשפט לתיקון, ובית המשפט יאשרו רק אם אין בכך קיפוח להגנת הנאשם; אין חשיבות לכך שהתיקון מחמיר או מקל.`,
   'ג':`תיקון מחמיר אסור לחלוטין לאחר ההקראה.`,
   'ד':`תיקון מותר רק אם הוא מיטיב עם הנאשם.`
 }, correct:'ב',
 explanation:`לפני ההקראה — התביעה רשאית לתקן כל דבר ורק להודיע. לאחר ההקראה — נדרשת רשות בית המשפט, שתינתן רק אם אין קיפוח להגנת הנאשם. אין חשיבות אם התיקון מחמיר או מקל (ס' 91-92). כאן, אם ייקבע קיפוח (הגנה שכבר נבנתה) — התיקון לא יותר.`,
 source:`ס' 91-92 לחסד"פ; תיקון כתב אישום`},

// ===== התליה, עיכוב וצירוף =====
{id:'q24', type:'mcq', topic:'tzeiruf', tag:'טכני', authentic:true,
 scenario:`במהלך משפט מבקש היועץ המשפטי לממשלה לעכב את ההליכים. הנאשם טוען כי הסמכות לעכב הליכים נתונה לבית המשפט. מהי ההבחנה הנכונה בין התליית הליכים לעיכוב הליכים?`,
 options:{
   'א':`שניהם בסמכות בית המשפט בלבד.`,
   'ב':`התליית הליכים — בסמכות בית המשפט (מיוזמתו או לבקשת צד); עיכוב הליכים (ס' 231) — בסמכות היועמ"ש בלבד, בהודעה מנומקת בכתב. בשניהם ניתן לחדש ולהמשיך מהנקודה שהופסקה.`,
   'ג':`עיכוב הליכים בסמכות בית המשפט; התליה בסמכות היועמ"ש.`,
   'ד':`שניהם מביאים לזיכוי סופי של הנאשם.`
 }, correct:'ב',
 explanation:`התליית הליכים = עצירה זמנית בסמכות בית המשפט (מיוזמתו/לבקשת צד), למשל כשהנאשם נמלט או חולה. עיכוב הליכים (ס' 231) הוא סמכות ייחודית של היועמ"ש בלבד, בהודעה מנומקת בכתב, ואינו טעון החלטת בית המשפט. שניהם אינם זיכוי — ניתן לחדש ולהמשיך מהנקודה שהופסקה.`,
 source:`התליה מול עיכוב הליכים; ס' 231, 94`},

{id:'q25', type:'mcq', topic:'tzeiruf', tag:'טכני', authentic:true,
 scenario:`התובע מבקש להגיש כתב אישום אחד נגד ראובן ושמעון שביצעו עבירה בצוותא. לשמעון מיוחסת עבירה שדינה 14 שנות מאסר (סמכות מחוזי), ולראובן עבירה שדינה 5 שנים (סמכות שלום). באיזו ערכאה יידון כתב האישום ומה העוגן?`,
 options:{
   'א':`בבית המשפט המחוזי, מכוח ס' 7 לחסד"פ.`,
   'ב':`בבית המשפט המחוזי, וס' 86 לחסד"פ הוא העוגן המאפשר את הצירוף בחצייה עניינית (הלכת סוסן — דעת רוב), בכפוף לתנאי ס' 87.`,
   'ג':`לא ניתן לצרפם — יש להגיש כתבי אישום נפרדים בכל ערכאה.`,
   'ד':`בבית משפט השלום, לפי העבירה הקלה.`
 }, correct:'ב',
 explanation:`לפי דעת הרוב בסוסן, ס' 86 משמש עוגן לצירוף נאשמים גם בחצייה עניינית (עבירות בערכאות שונות), בכפוף לקיום תנאי ס' 87 (ביחד/סיוע/עבירה זהה). התיק כולו יידון במחוזי — הערכאה הגבוהה. דעת המיעוט (גולדברג) ראתה ב-86 ו-87 מסלולים נפרדים. חשוב לדעת את שתי הדעות.`,
 source:`סוסן; ס' 86-87 לחסד"פ`},

// ===== טענות מקדמיות =====
{id:'q26', type:'mcq', topic:'mukdamot', tag:'טכני', authentic:true,
 scenario:`נאשם מודה בכל עובדות כתב האישום, אך מבקש שהתיק נגדו ייסגר בשל התיישנות. התביעה טוענת שמי שמודה באשמתו אינו יכול ליהנות מטענת התיישנות. מה הדין?`,
 options:{
   'א':`התביעה צודקת: טענת התיישנות עומדת רק למי שכופר באשמתו.`,
   'ב':`הנאשם רשאי לטעון התיישנות גם אם הודה — טענה מקדמית אינה נוגעת לאשמה אלא להליך; התוצאה אינה זיכוי אלא ביטול כתב האישום, וזו בחירה לגיטימית של הנאשם.`,
   'ג':`הודאת הנאשם מבטלת מניה וביה כל טענה מקדמית.`,
   'ד':`טענת התיישנות תוביל לזיכוי מלא שהוא מעשה בית דין.`
 }, correct:'ב',
 explanation:`טענות מקדמיות מכוונות נגד ההליך ולא נגד האשמה, ולכן ניתן להעלותן גם כשהנאשם אשם/מודה. התוצאה של קבלת טענת התיישנות היא ביטול כתב האישום (לא זיכוי), ולנאשם עומדת הבחירה הלגיטימית לבקש שהתיק ייסגר בשל התיישנות אף שהוא אשם.`,
 source:`ס' 9, 149 לחסד"פ; מהות טענה מקדמית`},

{id:'q27', type:'mcq', topic:'mukdamot', tag:'טכני', authentic:true,
 scenario:`אדם חשוד בהלבנת הון (עבירת פשע, 10 שנות מאסר) שבוצעה ב-1.1.2015. פעולת חקירה ראשונה בוצעה ב-1.1.2024. התברר שהחשוד שהה בחו"ל 6 שנים (2017–2023) כדי להימנע מהדין. האם העבירה התיישנה?`,
 options:{
   'א':`התיישנה — פעולת חקירה קוטעת התיישנות רק אם נעשתה בתוך 5 השנים הראשונות.`,
   'ב':`לא התיישנה — בחישוב תקופת ההתיישנות לא נמנים ימי השהייה בחו"ל להימנעות מהדין; בנטרול 6 השנים, פעולת החקירה ב-2024 נחשבת כאילו נעשתה בשנה השלישית למרוץ וקטעה אותו.`,
   'ג':`התיישנה — בפשע, לאחר 7 שנים ללא פעולת חקירה לא ניתן עוד לקטוע את המרוץ.`,
   'ד':`לא התיישנה — עבירת פשע כלל אינה מתיישנת.`
 }, correct:'ב',

  {id:'b8', topic:'טענות מקדמיות', title:`ראובן בלוד — סמכות, מותב, סיכון כפול והתיישנות`, prov:{real:'תשפ"ה · סמסטר ב׳ · מועד ב׳',official:true},
   question:`ב-1.1.2020 הוגש כ"א למחוזי בלוד (מחוז מרכז) נגד ראובן: כניסה והתפרצות למגורים בנסיבות מחמירות (10 שנים) + היזק בזדון (3 שנים). כ"א נמסר בביתו השכור בפ"ת (מגורי קבע באשקלון). לפי העובדות, ב-1.1.2012 ניפץ ראובן חלון של בית בצפון ת"א ונכנס בכוונה לגנוב. אילו טענות מקדמיות יעלה הסנגור? (פ"ת—מרכז, אשקלון—דרום, צפון ת"א—ת"א.)`,
   model:`• חוסר סמכות מקומית (ס' 149(1) + ס' 6) — הסמכות למחוז מקום ביצוע העבירה (ת"א) או מגורי הנאשם הקבועים (אשקלון—דרום); פ"ת היא מגורים ארעיים ואינה רלוונטית. לכן לא היה מקום להגיש למחוז מרכז. הטענה מיד לאחר ההקראה; לאחר מכן רק באישור ביהמ"ש (ס' 151). • חוסר סמכות עניינית (ס' 149(2)) — עבירת ההתפרצות (10 שנים) למחוזי; ההיזק (3 שנים) לכאורה לשלום, אך סיפת ס' 86 מאפשרת צירוף למחוזי. כן: מותב — לפי ס' 37(א)(1) עבירות שדינן 10 שנים ומעלה בשלושה שופטים, למעט המנויות בחלק א' לתוספת הראשונה (ס' 37(ב)(1)); התפרצות למגורים בנסיבות מחמירות שם — ולכן דן יחיד, אלא אם הורה הנשיא/סגנו אחרת. • סיכון כפול / ס' 186 — היזק בזדון כלול ביסודות ההתפרצות ("לרבות שבירת חלון וכניסה"), ולכן 'אותו מעשה' (ביטון, מבחן פיזי-צורני) — הרשעה אחת/ענישה אחת. • התיישנות (ס' 149(8) + ס' 9) — היזק בזדון הוא עוון (התיישנות 5 שנים); חלפו כ-8 שנים. יש לבדוק מתי הסתיימה החקירה ('אירוע מנתק'); פעולות תביעה לאחר סיום החקירה אינן מנתקות (שאקי — התנועה לאיכות השלטון). אם חלפו 5 שנים — הטענה תעמוד לעבירת ההיזק בלבד.`},
  {id:'b9', topic:'מהלך המשפט', title:`אלון ויאיר — ראיון עד, חומר חסוי ושימוע`, prov:{real:'תשפ"ה · סמסטר ב׳ · מועד ב׳',official:true},
   question:`(א) הפרקליטות זימנה את אלון (עד ראייה לרצח) לראיון הכנה, שבו הוסיף פרטים מהותיים שלא מסר במשטרה, ולא עדכנה את הסנגור. ביהמ"ש פסל את עדותו וקבע שחלה חובת תיעוד קולי/חזותי לראיונות עדים. דונו. (ב) בבקשה למעצר תו"ה של יאיר הוצגו לעיון השופט גיליון הרישום הפלילי ובדיקת פוליגרף (דובר שקר). מה דין טענת הסנגור שאין להיזקק להם? (ג) בתום פרשת התביעה טען הסנגור שקופחה זכות השימוע. דונו.`,
   model:`(א) בג"ץ מ"י נ' ביהמ"ש המחוזי — אין חובת תיעוד קולי/חזותי של ראיון עד, אלא חובת תרשומת של פרטים עובדתיים חדשים/מהותיים והעברתם לסנגוריה. היעדר תיעוד/פגם בראיון אינו מוביל לפסילת העדות אלא משפיע על משקלה. לכן קביעת ביהמ"ש (חובת תיעוד קולי/חזותי) אינה תואמת את הפסיקה; היה על הפרקליטות לתעד בתרשומת ולעדכן, וגם אם לא — הפגם במשקל ולא בקבילות. (ב) רישום פלילי — מוגרבי: ניתן להציג חומר חסוי לעיון השופט במעצר תו"ה כשהוא רלוונטי למעצר ואינו קשור במישרין לעבירות; הרישום מותר. פוליגרף — פרץ: אם ברור שראיה לא תהיה קבילה במשפט, אין להתחשב בה בתשתית למעצר תו"ה. (ג) שימוע — תלוי אם יאיר היה עצור מרגע העברת החומר לתובע והוגש כ"א בעודו עצור: אם כן — חל החריג בס' 60א(ז) (אין שימוע לעצור רציף), אף שמדובר בפשע; וגם אם קופחה הזכות — הסעד עשוי להיות שימוע בדיעבד ולא בהכרח ביטול.`},
  {id:'b10', topic:'שימוע וכתב אישום', title:`ירין — תיקון כ"א וחזרה מאישום`, prov:{real:'תשפ"ה · סמסטר ב׳ · מועד ב׳',official:true},
   question:`נגד ירין הוגש כ"א לשלום בגין גניבה ממעבידה (7 שנים). היא קיבלה את כ"א חצי שנה מראש, שכרה עו"ד ובנתה קו הגנה. ממש לפני ההקראה הגיש התובע כ"א מתוקן המוסיף עבירת איומים; הסנגור טען שאין לתקן ללא אישור ביהמ"ש כי ייגרם עיוות דין — וביהמ"ש לא אישר. לאחר תחילת המשפט וכפירת ירין, ביקש התובע לחזור בו מכ"א בשל כשלים ראייתיים; ביהמ"ש סירב, והסנגור טען שיש לבטל את האישום כך שניתן להגישו שוב רק באישור יועמ"ש. דונו.`,
   model:`• שימוע (ס' 60א) — עבירת פשע, ולא נתון ששלחו יידוע; אם לא — פסול בכ"א (ס' 149(3)), להעלות מיד לאחר תחילת המשפט. • תיקון כ"א (ס' 91-92) — התיקון התבקש לפני ההקראה, ולכן התובע רשאי לתקן בהודעה בלבד וללא אישור ביהמ"ש; שגה הסנגור בטענתו וגם שגה ביהמ"ש כשלא אישר (התיקון כלל לא היה טעון אישורו). • חזרה מאישום (ס' 93-94) — כאן החזרה היא לאחר מענה הנאשם (כפירה), ולכן התוצאה היא זיכוי (מעשה בית דין) ולא ביטול כ"א; לא ניתן להגיש כ"א חדש, גם לא באישור יועמ"ש — שגה הסנגור. כן: לביהמ"ש אין סמכות שלא לקבל את החלטת התובע לחזור מאישום; הביקורת על שיקול דעת התובע נתונה לבג"ץ.`},
  {id:'b11', topic:'מעצרים', title:`יונתן — שוד מזוין (כרונולוגיה מלאה)`, prov:{real:'תשפ"ו · סמסטר א׳ · מועד א׳',official:true},
   question:`אריק חטף דקירה ושוד בלובי בניין. עד מסר תיאור (רכב ב.מ.וו לבנה, טרנינג שחור עם פסים). המשטרה עיכבה רכב תואם, השוטר הורה לנהג (יונתן) לצאת, סירב להשיב לשאלותיו, וערך חיפוש ברכב ומצא סכין מוכתמת; אזק אותו (יונתן סבר שנחשד בסמים). למחרת ביקשה המשטרה הארכת מעצר; השופט קבע "תשתית ראייתית חלשה מאוד ונסיבתית... אינני סבור שמתגבש חשד סביר", אך בשל חומרת העבירות האריך ב-16 יום, ואז ב-13 נוספים. הוגשה הצהרת תובע למחוזי (3 ימים), ואז בקשה נוספת ליומיים לחיפוש בבית. הוגש כ"א למחוזי בהרכב שלושה + בקשה למעצר תו"ה שנשענה על חומרת העבירה ושתיקת יונתן. דונו.`,
   model:`• חיפוש ברכב — ס' 71: מותר ללא צו ביסוד סביר לחשד (דגני) לאור תיאור העד. • ביצוע המעצר — ס' 24: חובות הזדהות/הודעה/הבהרה; יונתן לא ידע מדוע נעצר → פגם (חריגים אינם חלים על חובת ההודעה; ס' 24(ג)). • מעצר ללא צו — ס' 23: יסוד סביר + עבירה בת מעצר. • הארכה (16 יום) — משנקבע שאין חשד סביר, נשמטת התשתית ואין להאריך על עילות בלבד; חומרת העבירה אינה מייתרת בחינת חלופה (עודה/גנימאת). • הארכה (13 יום) — חורגת מ-30 יום רצופים ללא אישור יועמ"ש. • הצהרת תובע — לשלום ולא למחוזי (ס' 2); וחריגה מ-30 יום ⇐ אישור יועמ"ש (ס' 17ד). • בקשת חיפוש נוספת אחרי הצהרת תובע — שימול: רק בהתפתחות מהותית שלא ניתן היה לצפות בשקידה סבירה; 'מקצה שיפורים' לא יספיק. • מותב — שוד מזוין (20 שנה) מצוי בתוספת הראשונה ⇐ דן יחיד; הרכב שלושה ללא הרחבה = חוסר סמכות. • מעצר תו"ה — אין חובת מעצר (עודה); שתיקה מקשה על הפרכת חזקת מסוכנות (קורמן, +ביקורת); בראיות מוחלשות הנטייה לחלופה (חסיד; +ביקורת תמיר — נוגד לשון החוק).`},
  {id:'b12', topic:'טענות מקדמיות', title:`יוליה — כרטיס אשראי בשלוש גרסאות`, prov:{real:'תשפ"ו · סמסטר א׳ · מועד א׳',official:true},
   question:`יוליה רכשה מוצרים בכרטיס אשראי שמצאה. (א) מיוחסות לה שתי עבירות מאותו מעשה (הונאה בכרטיס + קבלת דבר במרמה) והיא הודתה — מה תטענו ומתי? (ב) אם הוגש כ"א ב-2022 (הונאה) וכ"א נוסף ב-2025 (קבלת דבר במרמה) — מה תטענו? (ג) אם שותפהּ אליהו, הנראה עמה בסרטון, לא הועמד לדין — מה תטענו?`,
   model:`(א) ס' 186 — 'אותו מעשה' (מבחן פיזי-צורני, ביטון): רשאי ביהמ"ש להרשיע בכל אחת אך להעניש פעם אחת; להעלות בשלב הטיעונים לעונש. (ב) תלוי בשלב: אם ניתן כבר פס"ד (הרשעה/זיכוי) בעבירת 2022 — ס' 149(5) ('כבר זוכיתי/הורשעתי') לפי מבחן זהות הרכיבים; ביהמ"ש יבטל את כ"א המאוחר (2025). אם טרם ניתן פס"ד — ס' 149(6) ('משפט אחר תלוי ועומד'); יבטל את המאוחר וימשיך במוקדם. את שתי הטענות ניתן להעלות לאחר תחילת המשפט ואף בערעור, ללא אישור. (ג) ס' 149(10) — הגנה מן הצדק בשל אכיפה בררנית: דמיון רלוונטי (השניים בסרטון), אך התובע אינו חייב לפרט מדוע חזר מהאישום נגד אליהו (ביקורת בהליך מנהלי). יש לפרט את מבחן בורוביץ' התלת-שלבי; הסעד — ביטול כ"א (במקרים קיצוניים) או המתקת עונש.`},
  {id:'b13', topic:'מהלך המשפט', title:`משה — פסלות שופט`, prov:{real:'תשפ"ו · סמסטר א׳ · מועד א׳',official:true},
   question:`בהקראה נזף השופט במשה על שחייך ואמר שביצע תקיפת שוטרים "בקור רוח ועליה ייתן את הדין". בהמשך הגביל את החקירה הנגדית לחמש שאלות לעד ואת פרשת ההגנה ליום אחד. כן התברר שהתובע הוא בנה מנישואים קודמים של אשת השופט. דונו בסוגיות, לרבות הפרוצדורה.`,
   model:`• מבחן הפסלות — ידיד: 'אפשרות ממשית למשוא פנים' (לא די ב'חשש סביר'); אמירות כאלה, כשלעצמן, אינן מפסילות. בראון: יש לבחון אם גובשה עמדה נחרצת השוללת אובייקטיביות, ולעיתים פוסלים בשל 'אווירה עכורה'. • הגבלת חקירות/עדים — הנטייה לא לפסול על יסוד החלטות ניהול הליך; הגבלה/נזיפה הן מילוי תפקיד, ואין להעדיף מראית פני הצדק על עשיית צדק. • קרבת משפחה — ס' 77א לחוק בתי המשפט: שופט לא ישב בדין ביודעו שב"כ צד (התובע) הוא בן משפחתו (בן אשתו) — העילה החזקה. • פרוצדורה — ס' 146: להעלות לאחר תחילת המשפט ולפני כל טענה אחרת (בהזדמנות הראשונה); ס' 147: אם סורבה — ערעור לעליון תוך 5 ימים; המשפט יופסק עד להכרעה אלא אם החליט השופט להמשיך מנימוקים שיירשמו.`},
  {id:'b14', topic:'מעצרים', title:`שמעון — פריצת הבנק, ירי קטלני וכניסה לבית`, prov:{real:'תשפ"ו · סמסטר א׳ · מועד ב׳',official:true},
   question:`שמעון פרץ בלילה לסניף בנק בת"א, רוקן כספות ונמלט. כשבוע לאחר מכן הגיעו בלשים לביתו; שותפו לוי סירב לפתוח, והם פרצו את הדלת ונכנסו. שמעון קפץ מהחלון ונס; שוטר ירה לעבר ראשו והחטיא. אזקוהו והביאוהו לתחנה (חשד בפריצה וגניבה, 7 שנים). כעבור יומיים הובא להארכת מעצר; הוצג דוח סודי (שמועה + פוליגרף "דובר שקר"). התבקשו 18 יום (מסוכנות + צרכי חקירה), אושר. הוגשה הצהרת תובע (6 ימים), והחלופה נדחתה "לשלב תו"ה". הוגשו כ"א ובקשת מעצר תו"ה למחוז מרכז (לוד); השופט קבע שאינו נדרש להכריע בעילה כי התשתית (פוליגרף חד-משמעי + שמועות) חזקה דיה. דונו.`,
   model:`• ס' 4 — עדיפות לצו; היה זמן להוציא צו. • ס' 23 — מעצר ללא צו (תשתית+עילה). • כניסה לבית ללא צו — בירמן: משלא צוין 'מרדף', לפי דעת הרוב ניתן להיכנס בכוח מכוח הרשות לעצור (ס' 45 + 25(4)). • ס' 24 — הבלשים לא הזדהו, לא הודיעו ולא הבהירו; גם בהתקיים חריגים, חובת ההודעה אינה נסוגה ⇐ מעצר לא חוקי (ס' 24(ג)). • ירי קטלני — גולד/אנקונינה: לא היה מותר — המעצר לא חוקי, העבירה (פריצה/גניבה) אינה מסכנת חיים, לא ניתנה התראה/ירי אזהרה, והירי כוון לפלג גוף עליון. • ס' 29 — הובא לשופט רק כעבור יומיים. • הארכה (18/16 יום) — צרכי חקירה עד 5 ימים (ברונסון); מסוכנות עד 15; ⇐ אינה כדין. • ס' 13(א) — 'שמועה שפשתה' ופוליגרף: קבילים במעצר ימים (ס' 15(ו)) אך ספק אם מבססים 'חשד סביר' (רוזנשטיין). • הצהרת תובע — עד 5 ימים (ס' 17ד); 6 ימים פסול; חובה לבחון חלופה גם בשלב זה (בדווי/מטייב). • סמכות עניינית — 7 שנים ⇐ שלום ולא מחוזי (ס' 51). • סמכות מקומית — ת"א ולא מרכז (ס' 6). • רכוש כמסוכנות — פרנקל: רק בשיטתיות/היקף ניכר/תחכום. • מעצר תו"ה — שגיאות השופט: (1) הרף הוא 'ראיות לכאורה'/'סיכוי סביר להרשעה' (זאדה) ולא 'חשד סביר'; (2) לא ניתן לוותר על הכרעה בעילת מעצר; (3) הסתמכות על ראיות לא-קבילות אסורה בתשתית תו"ה (מוגרבי).`},
  {id:'b15', topic:'הגנה מן הצדק', title:`רוני — סוכן מדיח, השמדת ראיות ושיהוי`, prov:{real:'תשפ"ו · סמסטר א׳ · מועד ב׳',official:true},

function saveBrisAns(id,text){
  const p=loadProg();
  if(!p.bris)p.bris={};
  if(!p.bris[id])p.bris[id]={};
  p.bris[id].ans=text;
  saveProg(p);
}
function setBrisLevel(id,level){
  const p=loadProg();
  if(!p.bris)p.bris={};
  if(!p.bris[id])p.bris[id]={};
  p.bris[id].level=level;
  p.bris[id].seen=(p.bris[id].seen||0)+1;
  saveProg(p);
}
const BRIS_LEVELS={know:['✓ ידעתי','#10b981'],partial:['◐ חלקית','#f59e0b'],no:['✗ לא ידעתי','#ef4444']};

let brisState={cur:0,revealed:false};
function nextBris(){
  brisState.revealed=false;
  if(brisState.cur<BRIS.length-1)brisState.cur++;
  renderBris();
}
function renderBris(){
  const total=BRIS.length;
  let idx=Math.min(Math.max(0,brisState.cur),total-1);
  brisState.cur=idx;
  const q=BRIS[idx];
  const prog=loadProg().bris||{};
  const saved=prog[q.id]||{};
  const revealed=brisState.revealed;
  const done=BRIS.filter(b=>(prog[b.id]||{}).level).length;
  const lvl=saved.level?BRIS_LEVELS[saved.level]:null;

  const header=h('div',{style:'display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap'},
    h('span',{style:'font-weight:700'},'🎤 קייסים פתוחים'),
    h('span',{style:'font-size:.8rem;color:var(--text-faint)'},(idx+1)+' מתוך '+total),
    h('span',{class:'badge',style:'background:#eef2ff;color:#4f46e5'},q.topic),
    provBadge('open',q.id,q.prov),
    h('span',{class:'badge',style:'background:#f0fdf4;color:#065f46'},'✓ הושלמו '+done+'/'+total),
    lvl?h('span',{class:'badge',style:`background:${lvl[1]}22;color:${lvl[1]}`},lvl[0]):null
  );

  const revealSection=revealed
    ?h('div',{},
        h('div',{style:'font-weight:700;font-size:.85rem;margin:14px 0 4px'},'תשובת מודל:'),
        h('div',{class:'model-box'},q.model),
        h('div',{style:'font-weight:600;font-size:.8rem;margin-top:14px'},'הערכה עצמית: כמה תשובתך הייתה קרובה?'),
        h('div',{class:'btn-row'},
          h('button',{class:'btn btn-re',onclick:()=>{setBrisLevel(q.id,'no');nextBris();}},'✗ לא ידעתי'),
          h('button',{class:'btn btn-gy',onclick:()=>{setBrisLevel(q.id,'partial');nextBris();}},'◐ חלקית'),
          h('button',{class:'btn btn-gr',onclick:()=>{setBrisLevel(q.id,'know');nextBris();}},'✓ ידעתי')
        )
      )
    :h('button',{class:'btn btn-ind',style:'margin-top:14px',onclick:()=>{brisState.revealed=true;renderBris();}},'הצג תשובת מודל להשוואה ▼');

  document.getElementById('bris').replaceChildren(
    header,
    h('div',{class:'pbar',style:'margin-bottom:12px'},h('div',{class:'pfill',style:`width:${(done/total)*100}%;background:#10b981`})),
    h('div',{class:'card'},
      h('div',{style:'font-weight:700;font-size:1rem;margin-bottom:4px'},q.title),
      h('div',{class:'q-text',style:'margin-bottom:12px'},q.question),
      h('div',{style:'font-size:.78rem;color:var(--text-faint);margin-bottom:6px'},'כתוב את תשובתך, ואז השווה למודל. אל תציץ לפני שניסית!'),
      h('textarea',{class:'open-ans',placeholder:'כתוב כאן את תשובתך, כולל הפניה למקור (סעיף חוק / פסק דין) והנמקה תמציתית...',
        oninput:(e)=>saveBrisAns(q.id,e.target.value)},saved.ans||''),
      revealSection
    ),
    h('div',{class:'btn-row'},
      h('button',{class:'btn btn-gy',style:idx===0?'opacity:.4':'',onclick:()=>{if(idx>0){brisState.cur--;brisState.revealed=false;renderBris();}}},'→ הקודם'),
      h('button',{class:'btn btn-gy',style:idx===total-1?'opacity:.4':'',onclick:()=>{if(idx<total-1){brisState.cur++;brisState.revealed=false;renderBris();}}},'הבא ←')
    )
  );
}

// ── Progress ─────────────────────────────────────────────────────────────
function progKey(){return 'sadap1_prog';}
function loadProg(){try{return JSON.parse(localStorage.getItem(progKey())||'{}')}catch{return{}}}
function saveProg(p){localStorage.setItem(progKey(),JSON.stringify(p));}
function recAns(id,ok,tag){
  const p=loadProg();
  if(!p.q)p.q={};
  if(!p.q[id])p.q[id]={a:0,c:0};
  p.q[id].a++; if(ok)p.q[id].c++; p.q[id].tag=tag;
  if(!p.tag)p.tag={};
  if(!p.tag[tag])p.tag[tag]={a:0,c:0};
  p.tag[tag].a++; if(ok)p.tag[tag].c++;
  saveProg(p);
}
function setCaseBox(id,known){
  const p=loadProg();
  if(!p.c)p.c={};
  if(!p.c[id])p.c[id]={box:0,seen:0};
  p.c[id].seen++;
  p.c[id].box=known?Math.min(3,p.c[id].box+1):0;
  p.c[id].known=known;
  saveProg(p);
}

// ── Utils ────────────────────────────────────────────────────────────────
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function el(tag,attrs={},children=[]){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){if(k==='class')e.className=v;else if(k.startsWith('on'))e.addEventListener(k.slice(2),v);else e.setAttribute(k,v);}
  for(const c of children){
    if(c==null||c===false||c===undefined)continue;
    if(c instanceof Node)e.appendChild(c);
    else e.appendChild(document.createTextNode(String(c)));
  }
  return e;
}
function h(tag,attrs,...children){return el(tag,attrs,children.flat(9));}
function topicInfo(id){return TOPICS.find(t=>t.id===id)||{icon:'📌',name:id,id};}

const TABS=['dash','sim','study','flash','bris','aids'];
function showTab(tab){
  TABS.forEach(t=>document.getElementById(t).style.display=t===tab?'':'none');
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',TABS[i]===tab));
  const fns={dash:renderDash,sim:renderSim,study:renderStudy,flash:renderFlash,bris:renderBris,aids:renderAids};
  fns[tab]();
}

const MCQ_PTS=5, MCQ_N=4;          // 4*5 = 20
const OPEN_WEIGHTS=[30,30,20];      // 80 → סה"כ 100 (תואם למבנה מבחן האמת)
function adaptOpen(b,weight){return {type:'open',id:b.id,title:b.title,topic:b.topic,prov:b.prov,scenario:b.question,modelAnswer:b.model,weight:weight};}
function renderSim(){
  if(!simState||simState.done){

    const opens=shuffle(BRIS).slice(0,OPEN_WEIGHTS.length).map((b,i)=>adaptOpen(b,OPEN_WEIGHTS[i]));
    simState={qs:[...opens,...mcqs],cur:0,answers:{},openAnswers:{},openGrades:{},openRecorded:{},started:false,done:false,timeUp:false,timerStart:null};

function drawSim(){
  if(simState.done||simState.timeUp){drawSimResult();return;}
  const {qs,cur,answers,openAnswers}=simState;
  const q=qs[cur];
  const cont=document.getElementById('sim');

  const grid=h('div',{class:'ans-grid'},...qs.map((qq,i)=>{
    const answered=qq.type==='mcq'?!!answers[i]:!!(openAnswers[i]&&openAnswers[i].trim());
    return h('button',{class:'ans-cell'+(answered?' answered':'')+(i===cur?' current':''),onclick:()=>{simState.cur=i;drawSim();}},String(i+1));
  }));

  const isOpen=q.type==='open';
  const header=h('div',{class:'card',style:'display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px'},
    h('span',{style:'font-size:.85rem;color:var(--text-dim)'},'שאלה '+(cur+1)+' מתוך '+qs.length),
    h('span',{id:'simTimer',class:'timer'},'03:00:00'),

  );

  let body;
  if(q.type==='mcq'){
    const sel=answers[cur];
    const opts=Object.entries(q.options).map(([l,t])=>{
      let cls='opt'; if(sel===l)cls+=' sel';
      return h('button',{class:cls,onclick:()=>{simState.answers[cur]=l;drawSim();}},h('strong',{},l+'. '),t);
    });
    body=h('div',{class:'card'},
      h('div',{style:'margin-bottom:8px'},provBadge('mcq',q.id,q.prov)),
      h('div',{class:'q-text'},q.scenario),
      h('div',{style:'margin-top:14px'},...opts)
    );
  }else{
    body=h('div',{class:'card'},
      h('div',{style:'display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:6px'},
        h('span',{style:'font-weight:700;font-size:.95rem'},q.title),
        provBadge('open',q.id,q.prov)
      ),
      h('div',{style:'font-size:.8rem;color:var(--text-faint);margin-bottom:6px'},'קייס פתוח · נמקו בסדר כרונולוגי וציינו מקור מדויק (סעיף / פס"ד)'),
      h('div',{class:'q-text'},q.scenario),
      h('textarea',{class:'open-ans',placeholder:'כתוב כאן את תשובתך, כולל הפניה מדויקת לסעיף או פסק דין...',oninput:(e)=>{simState.openAnswers[cur]=e.target.value;}},openAnswers[cur]||'')
    );
  }

  const navBtns=h('div',{class:'btn-row'},
    cur>0?h('button',{class:'btn btn-gy',onclick:()=>{simState.cur--;drawSim();}},'→ הקודם'):null,
    cur<qs.length-1?h('button',{class:'btn btn-ind',onclick:()=>{simState.cur++;drawSim();}},'הבא ←'):h('button',{class:'btn btn-gr',onclick:()=>{simState.done=true;drawSim();}},'סיים מבחן ✓')
  );

  cont.replaceChildren(header,grid,body,navBtns,
    h('button',{class:'btn btn-gy btn-sm',style:'margin-top:10px',onclick:()=>{if(confirm('לסיים את הסימולציה עכשיו?')){simState.done=true;drawSim();}}},'סיים מבחן מוקדם')
  );

  if(!simState.timerStart)simState.timerStart=Date.now();
  if(simState.timerInterval)clearInterval(simState.timerInterval);
  simState.timerInterval=setInterval(()=>{
    const elapsed=Math.floor((Date.now()-simState.timerStart)/1000);
    const rem=Math.max(0,SIM_SECONDS-elapsed);
    const tm=document.getElementById('simTimer');
    if(tm){
      const hh=String(Math.floor(rem/3600)).padStart(2,'0');

      const ss=String(rem%60).padStart(2,'0');
      tm.textContent=hh+':'+mm+':'+ss;
      if(rem<300)tm.classList.add('urgent');
    }
    if(rem===0){clearInterval(simState.timerInterval);simState.timeUp=true;drawSim();}
  },1000);
}

      h('div',{class:'expl'},'💡 '+q.explanation),
      h('div',{style:'font-size:.72rem;color:var(--text-faint);margin-top:6px'},'מקור: '+q.source),
      (ua&&!ok&&q.tag==='טכני')?h('div',{class:'alert-pattern'},'⚠️ שים לב לדפוס: הכלל הטכני גובר על האינטואיציה.'):null
    );
  });

  const openCards=openIdx.map(({q,i})=>{
    const g=openGrades[i];
    const w=q.weight, half=Math.round(w/2);
    const gradeBtn=(pts,label,cls)=>h('button',{class:'btn '+cls+' btn-sm',style:(g!==undefined&&g!==pts)?'opacity:.5':'',onclick:()=>{
      simState.openGrades[i]=pts;
      if(!simState.openRecorded[i]){recAns(q.id,pts>=w/2,'קייס');simState.openRecorded[i]=true;}
      drawSimResult();
    }},label);
    return h('div',{class:'r-card'},
      h('div',{style:'display:flex;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:6px'},
        h('span',{style:'font-weight:700;font-size:.85rem'},q.title),
        h('span',{class:'badge',style:g!==undefined?'background:#d1fae5;color:#065f46':'background:#f3f4f6;color:#6b7280'},g!==undefined?('ציון: '+g+'/'+w):('קייס · '+w+" נק'"))
      ),
      h('div',{style:'margin-bottom:6px'},provBadge('open',q.id,q.prov)),
      h('div',{style:'font-size:.875rem;margin-bottom:6px;white-space:pre-wrap'},q.scenario),
      h('div',{style:'font-weight:600;font-size:.8rem;margin-top:8px'},'התשובה שלך:'),
      h('div',{class:'your-ans-box'},(openAnswers[i]&&openAnswers[i].trim())?openAnswers[i]:'(לא נענתה)'),
      h('div',{style:'font-weight:600;font-size:.8rem;margin-top:8px'},'מחוון: תשובת מודל'),
      h('div',{class:'model-box'},q.modelAnswer),
      h('div',{style:'font-weight:600;font-size:.8rem;margin-top:10px'},'הערכה עצמית (מתוך '+w+'):'),
      h('div',{class:'btn-row',style:'margin-top:4px'},
        gradeBtn(0,'✗ חסר (0)','btn-re'),
        gradeBtn(half,'◐ חלקי ('+half+')','btn-gy'),
        gradeBtn(w,'✓ מלא ('+w+')','btn-gr')
      )
    );
  });

  document.getElementById('sim').replaceChildren(
    h('div',{class:'result-header'},
      h('div',{class:'big-score'},String(totalPoints),h('span',{style:'font-size:1.2rem;color:var(--text-faint)'},'/100')),
      h('div',{style:'font-size:1.15rem;margin:4px 0'},timeUp?'⏱️ הזמן נגמר':emoji),
      h('div',{style:'color:var(--text-faint);font-size:.82rem'},"קייסים: "+openPoints+'/'+openMax+" · אמריקאיות: "+mcqPoints+'/'+mcqMax),
      !allGraded?h('div',{style:'font-size:.78rem;color:#d97706;margin-top:6px;font-weight:600'},'דרגו את הקייסים הפתוחים למטה כדי להשלים את הציון'):null
    ),
    h('div',{style:'font-weight:700;margin:12px 0 6px'},"חלק א׳ · קייסים פתוחים: השוואה למחוון"),
    ...openCards,
    h('div',{style:'font-weight:700;margin:16px 0 6px'},"חלק ב׳ · אמריקאיות: סקירה ("+MCQ_PTS+" נק' לשאלה)"),
    ...mcqCards,
    h('button',{class:'btn btn-gy',style:'margin-top:12px',onclick:()=>{simState=null;renderSim();}},'🔄 סימולציה חדשה'),
    h('button',{class:'btn btn-gy',style:'margin-top:8px',onclick:()=>showTab('dash')},'→ חזרה ללוח בקרה')
  );
  if(simState.timerInterval)clearInterval(simState.timerInterval);
}

// ── Study by topic ───────────────────────────────────────────────────────
let studyState={topic:null,cur:0,sel:null};
function renderStudy(initTopic){
  if(initTopic)studyState={topic:initTopic,cur:0,sel:null};
  if(!studyState.topic)drawStudyTopicList();else drawStudyQuestion();
}
function drawStudyTopicList(){
  const prog=loadProg().q||{};
  const mcq=QUESTIONS.filter(q=>q.type==='mcq');
  const rows=TOPICS.map(tm=>{
    const tqs=mcq.filter(q=>q.topic===tm.id);
    if(!tqs.length)return null;
    const done=tqs.filter(q=>prog[q.id]?.a>0).length;
    const corr=tqs.filter(q=>prog[q.id]?.c>0).length;
    const pct=done?Math.round(corr/done*100):0;
    return h('div',{class:'card',style:'display:flex;justify-content:space-between;align-items:center;cursor:pointer',
      onclick:()=>{studyState={topic:tm.id,cur:0,sel:null};drawStudyQuestion();}},
      h('div',{},
        h('div',{style:'font-weight:600'},tm.icon+' '+tm.name),
        h('div',{style:'font-size:.75rem;color:var(--text-faint)'},tqs.length+' שאלות · '+done+' נענו')
      ),
      h('div',{style:'text-align:left'},
        h('div',{style:`font-weight:700;font-size:.9rem;color:${pct>60?'#10b981':pct>30?'#f59e0b':'#ef4444'}`},done?pct+'%':'-'),
        h('div',{style:'font-size:.7rem;color:var(--text-faint)'},'הצלחה')
      )
    );
  }).filter(Boolean);
  document.getElementById('study').replaceChildren(
    h('div',{style:'font-weight:700;font-size:1.1rem;margin-bottom:12px'},'בחר נושא לתרגול'),
    ...rows
  );
}
function drawStudyQuestion(){
  const {topic,cur,sel}=studyState;
  const tqs=QUESTIONS.filter(q=>q.type==='mcq'&&q.topic===topic);
  const q=tqs[cur];
  const ti=topicInfo(topic);

  const opts=Object.entries(q.options).map(([l,t])=>{
    let cls='opt';
    if(sel){if(l===q.correct)cls+=' ok';else if(l===sel)cls+=' bad';}
    return h('button',{class:cls,onclick:()=>{
      if(sel)return;
      studyState.sel=l;
      recAns(q.id,l===q.correct,q.tag);
      drawStudyQuestion();
    }},h('strong',{},l+'. '),t);
  });

  let ansBox=null;
  if(sel){
    const ok=sel===q.correct;
    ansBox=h('div',{class:'ans-box '+(ok?'ans-ok':'ans-bad')},
      h('div',{},h('strong',{},ok?'✓ נכון':'✗ שגוי, התשובה הנכונה: '+q.correct)),
      h('div',{style:'margin-top:6px'},'💡 '+q.explanation),
      h('div',{style:'margin-top:6px;font-size:.75rem;color:var(--text-faint)'},'מקור: '+q.source),
      (!ok&&q.tag==='טכני')?h('div',{class:'alert-pattern'},'⚠️ שים לב לדפוס: הכלל הטכני גובר על האינטואיציה.'):null
    );
  }

  document.getElementById('study').replaceChildren(
    h('div',{style:'display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap'},
      h('button',{class:'btn btn-gy btn-sm',onclick:()=>{studyState.topic=null;drawStudyTopicList();}},'→ נושאים'),
      h('span',{style:'font-weight:700'},ti.icon+' '+ti.name),
      h('span',{style:'font-size:.8rem;color:var(--text-faint)'},(cur+1)+'/'+tqs.length),
      h('span',{class:'badge',style:'background:#eef2ff;color:#4f46e5'},q.tag),
      provBadge('mcq',q.id,q.prov)
    ),
    h('div',{class:'pbar',style:'margin-bottom:12px'},h('div',{class:'pfill',style:`width:${(cur/tqs.length)*100}%;background:#6366f1`})),
    h('div',{class:'card'},
      h('div',{class:'q-meta'},q.source),
      h('div',{class:'q-text'},q.scenario),
      h('div',{style:'margin-top:14px'},...opts),
      ansBox
    ),
    h('div',{class:'btn-row'},
      h('button',{class:'btn btn-gy',style:cur===0?'opacity:.4':'',onclick:()=>{if(cur>0){studyState.cur--;studyState.sel=null;drawStudyQuestion();}}},'→ הקודם'),
      h('button',{class:'btn btn-ind',style:cur===tqs.length-1?'opacity:.4':'',onclick:()=>{if(cur<tqs.length-1){studyState.cur++;studyState.sel=null;drawStudyQuestion();}}},'הבא ←')
    )
  );
}

// ── Flashcards (פסיקה) ───────────────────────────────────────────────────
let flashState={topic:null,cur:0,flipped:false};
function orderedCases(topic){
  const list=topic?CASES.filter(c=>c.topic===topic):CASES;
  const prog=loadProg().c||{};
  return [...list].sort((a,b)=>((prog[a.id]&&prog[a.id].box)||0)-((prog[b.id]&&prog[b.id].box)||0));
}
function renderFlash(){
  const {topic,flipped}=flashState;
  const cards=orderedCases(topic);
  const idx=Math.min(flashState.cur,cards.length-1);
  const card=cards[idx];
  if(!card){document.getElementById('flash').replaceChildren(h('div',{},'אין כרטיסיות')); return;}
  const uTopics=[...new Set(CASES.map(c=>c.topic))];
  const prog=loadProg().c||{};

  const topicBtns=[
    h('button',{class:'topic-btn'+(topic===null?' on':''),onclick:()=>{flashState={topic:null,cur:0,flipped:false};renderFlash();}},'הכל'),
    ...uTopics.map(t=>h('button',{class:'topic-btn'+(topic===t?' on':''),onclick:()=>{flashState={topic:t,cur:0,flipped:false};renderFlash();}},t))
  ];

  const flipCard=h('div',{class:'flip-card'+(flipped?' flipped':''),onclick:()=>{flashState.flipped=!flashState.flipped;renderFlash();}},
    h('div',{class:'flip-inner'},
      h('div',{class:'flip-face flip-front'},
        h('div',{class:'flip-topic'},card.topic),
        h('div',{class:'flip-q'},card.name),
        h('div',{class:'flip-hint'},'לחץ להפוך')
      ),
      h('div',{class:'flip-face flip-back'},
        h('div',{class:'flip-ans'},card.holding)
      )
    )
  );

  const markBtns=flipped?h('div',{class:'btn-row'},
    h('button',{class:'btn btn-re',onclick:(e)=>{e.stopPropagation();setCaseBox(card.id,false);flashState.flipped=false;if(idx<cards.length-1)flashState.cur=idx+1;renderFlash();}},'✗ לא ידעתי'),
    h('button',{class:'btn btn-gr',onclick:(e)=>{e.stopPropagation();setCaseBox(card.id,true);flashState.flipped=false;if(idx<cards.length-1)flashState.cur=idx+1;renderFlash();}},'✓ ידעתי')
  ):null;

  const known=cards.filter(c=>prog[c.id]&&prog[c.id].known===true).length;
  const unknown=cards.filter(c=>prog[c.id]&&prog[c.id].known===false).length;
  const unseen=cards.length-cards.filter(c=>prog[c.id]&&prog[c.id].seen>0).length;

  document.getElementById('flash').replaceChildren(
    h('div',{class:'topic-filters'},...topicBtns),
    h('div',{class:'progress-counter'},'כרטיסייה '+(idx+1)+' מתוך '+cards.length+' · הקלפים הקשים ביותר מוצגים ראשונים'),
    flipCard,
    ...(markBtns?[markBtns]:[]),
    h('div',{class:'btn-row',style:'margin-top:8px'},
      h('button',{class:'btn btn-gy',style:idx===0?'opacity:.4':'',onclick:()=>{if(idx>0){flashState.cur=idx-1;flashState.flipped=false;renderFlash();}}},'→ הקודם'),
      h('button',{class:'btn btn-gy',style:idx===cards.length-1?'opacity:.4':'',onclick:()=>{if(idx<cards.length-1){flashState.cur=idx+1;flashState.flipped=false;renderFlash();}}},'הבא ←')
    ),
    h('div',{class:'card',style:'margin-top:12px'},
      h('div',{class:'known-bar'},
        h('span',{style:'color:#10b981'},'✓ '+known+' יודע'),
        h('span',{style:'color:#ef4444'},'✗ '+unknown+' לא יודע'),
        h('span',{style:'color:var(--text-faint)'},'○ '+unseen+' לא נסקר')
      )
    )
  );
}

// ── Boot ─────────────────────────────────────────────────────────────────
function boot(){
  document.getElementById('qcount').textContent=QUESTIONS.filter(q=>q.type==='mcq').length;
  document.getElementById('ccount').textContent=CASES.length;
  showTab('dash');
}
boot();
</script>
